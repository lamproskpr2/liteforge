<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LiteForge - A modern, lightweight frontend framework" />
    <title>LiteForge Demo</title>
    
    <!-- Prevent theme flash: apply stored theme before first paint -->
    <script>
      (function() {
        var stored = localStorage.getItem('liteforge_theme');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.dataset.theme = stored;
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>

    <!-- Prevent flash of unstyled content -->
    <style>
      html, body { height: 100%; margin: 0; }
      #app { height: 100%; display: flex; flex-direction: column; }
      #app:empty::before {
        content: "Loading LiteForge...";
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
